name: CI Build

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          cd packages/shared-types && npm run build || true
          cd ../db && npm run build || true

      - name: Type check backend
        run: cd backend && npx tsc --noEmit

      - name: Type check frontend-web
        run: cd frontend-web && npx tsc --noEmit

      - name: Type check mobile-app
        run: cd mobile-app && npx tsc --noEmit

      - name: Build frontend-web
        run: cd frontend-web && npm run build

      - name: Build mobile-app
        run: cd mobile-app && npm run build

      - name: Build admin-panel
        run: cd admin-panel && npm run build

      - name: Run backend tests
        run: cd backend && npm run test
